name: arovolife

# =============================================================================
# arovolife — Service Access Reference
# =============================================================================
# Web app             http://localhost:8084
# Adminer             http://localhost:8083    (server: db, user: arovolife, pass: secret)
# Mailpit UI          http://localhost:8027    (SMTP from host: localhost:1027)
#
# MySQL  (host: localhost:3307 from host, db:3306 from containers)
#   arovolife / secret      (app DB user)
#   root      / rootsecret  (DB admin)
#
# Redis  (host: localhost:6379 from host, redis:6379 from containers)
#
# NOTE: a `summary` service prints the same info on `docker compose up`.
#       For detached startup (`up -d`), view it via `docker compose logs summary`.
# =============================================================================

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: arovolife-app
    working_dir: /var/www/html
    volumes:
      - ../app:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/zz-arovolife.ini:ro
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: arovolife
      DB_USERNAME: arovolife
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [arovolife]

  web:
    image: nginx:1.27-alpine
    container_name: arovolife-web
    ports: ["8084:80"]
    volumes:
      - ../app:/var/www/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [arovolife]

  db:
    image: mysql:8.0
    container_name: arovolife-db
    command: ["--default-authentication-plugin=caching_sha2_password"]
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: arovolife
      MYSQL_USER: arovolife
      MYSQL_PASSWORD: secret
      TZ: Asia/Kolkata
    ports: ["3307:3306"]
    volumes:
      - dbdata:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/arovolife.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uarovolife", "-psecret"]
      interval: 5s
      retries: 30
      start_period: 10s
    networks: [arovolife]

  redis:
    image: redis:7-alpine
    container_name: arovolife-redis
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 20
    networks: [arovolife]

  mailpit:
    image: axllent/mailpit:latest
    container_name: arovolife-mailpit
    # Host ports remapped to avoid clash with docker-multi-projects mailhog (1025/8025)
    # and karonix-codex mailpit (1026/8026). Container-internal ports unchanged, so
    # the app still uses MAIL_HOST=mailpit, MAIL_PORT=1025 over the docker network.
    ports:
      - "1027:1025"   # SMTP — host 1027 → container 1025
      - "8027:8025"   # UI   — http://localhost:8027
    networks: [arovolife]

  adminer:
    image: adminer:4.8.1-standalone
    container_name: arovolife-adminer
    ports: ["8083:8080"]
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: dracula
    depends_on: [db]
    networks: [arovolife]

  queue:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: arovolife-queue
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=2", "--timeout=120"]
    volumes:
      - ../app:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: arovolife
      DB_USERNAME: arovolife
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [arovolife]

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: arovolife-scheduler
    working_dir: /var/www/html
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ../app:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: arovolife
      DB_USERNAME: arovolife
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    networks: [arovolife]

  # ---------------------------------------------------------------------------
  # Summary — runs once on `docker compose up`, prints access info, then exits.
  # ---------------------------------------------------------------------------
  summary:
    image: busybox:1.36
    container_name: arovolife-summary
    restart: "no"
    depends_on:
      web:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      adminer:
        condition: service_started
      mailpit:
        condition: service_started
    command:
      - sh
      - -c
      - |
        echo ""
        echo "==============================================="
        echo "🚀  arovolife — running"
        echo "==============================================="
        echo ""
        echo "🌐  Web app             http://localhost:8084"
        echo "🛠️  Adminer             http://localhost:8083"
        echo "                        server: db   user: arovolife   pass: secret"
        echo "📧  Mailpit UI          http://localhost:8027"
        echo "                        SMTP from host: localhost:1027"
        echo ""
        echo "🗄️  MySQL  (host: localhost:3307, container: db:3306)"
        echo "    arovolife / secret      (app)"
        echo "    root      / rootsecret  (admin)"
        echo ""
        echo "📦  Redis  (host: localhost:6379, container: redis:6379)"
        echo ""
    networks: [arovolife]

networks:
  arovolife:
    name: arovolife

volumes:
  dbdata:
    name: arovolife_dbdata
