name: arovolife

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: arovolife-app
    working_dir: /var/www/html
    volumes:
      - ../app:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/zz-arovolife.ini:ro
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: arovolife
      DB_USERNAME: arovolife
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [arovolife]

  web:
    image: nginx:1.27-alpine
    container_name: arovolife-web
    ports: ["8084:80"]
    volumes:
      - ../app:/var/www/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [arovolife]

  db:
    image: mysql:8.0
    container_name: arovolife-db
    command: ["--default-authentication-plugin=caching_sha2_password"]
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: arovolife
      MYSQL_USER: arovolife
      MYSQL_PASSWORD: secret
      TZ: Asia/Kolkata
    ports: ["3307:3306"]
    volumes:
      - dbdata:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/arovolife.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uarovolife", "-psecret"]
      interval: 5s
      retries: 30
      start_period: 10s
    networks: [arovolife]

  redis:
    image: redis:7-alpine
    container_name: arovolife-redis
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 20
    networks: [arovolife]

  mailpit:
    image: axllent/mailpit:latest
    container_name: arovolife-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI
    networks: [arovolife]

  adminer:
    image: adminer:4.8.1-standalone
    container_name: arovolife-adminer
    ports: ["8083:8080"]
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: dracula
    depends_on: [db]
    networks: [arovolife]

  queue:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: arovolife-queue
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=2", "--timeout=120"]
    volumes:
      - ../app:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: arovolife
      DB_USERNAME: arovolife
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [arovolife]

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: arovolife-scheduler
    working_dir: /var/www/html
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ../app:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: arovolife
      DB_USERNAME: arovolife
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    networks: [arovolife]

networks:
  arovolife:
    name: arovolife

volumes:
  dbdata:
    name: arovolife_dbdata
