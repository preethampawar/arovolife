name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when a new commit lands on the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Pint · PHPStan · Pest
    runs-on: ubuntu-latest

    # Laravel project lives one level down (the repo root holds docker/, docs/,
    # backlog/, etc.). All composer / artisan / vendor commands run from here.
    defaults:
      run:
        working-directory: app

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootsecret
          MYSQL_DATABASE: arovolife_test
          MYSQL_USER: arovolife
          MYSQL_PASSWORD: secret
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uarovolife -psecret"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      APP_ENV: testing
      APP_KEY: base64:7sw5q5z3R5JlIGHk4kV+f9yTcl3iqI4w2hRbB8GXhcA=
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3307
      DB_DATABASE: arovolife_test
      DB_USERNAME: arovolife
      DB_PASSWORD: secret

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, mbstring, intl, mysql, pdo_mysql, openssl, fileinfo, gd
          tools: composer:v2
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: app/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('app/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3307 -uarovolife -psecret --silent; then
              echo "MySQL is up"
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready" && exit 1

      - name: Pint (style)
        run: vendor/bin/pint --test

      - name: PHPStan / Larastan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      - name: Pest
        run: vendor/bin/pest --colors=always
